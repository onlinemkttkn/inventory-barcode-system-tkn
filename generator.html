<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><title>สร้าง Barcode และ QR Code</title><link rel="stylesheet" href="./css/style.css?v=1.0.2"><link rel="stylesheet" href="./css/generator.css?v=1.0.2">  <link rel="stylesheet" href="./css/navigation.css?v=1.0.2">
  <link rel="icon" href="./assets/icons/favicon.svg?v=1.0.2">
  <link rel="stylesheet" href="./css/theme-red-yellow-black.css?v=3.4.0">
</head><body><main class="app-shell"><header class="page-header"><div><p class="eyebrow">PHASE 06.2</p><h1>สร้าง Barcode และ QR Code</h1><p>ค้นหาสินค้า เลือกข้อมูล แล้วสร้าง Code128 หรือ QR Code พร้อมพิมพ์</p></div><div class="button-row header-actions"><a class="button secondary link-button" href="./dashboard.html">หน้าสแกน</a><button id="logoutBtn" class="button secondary hidden" type="button">ออกจากระบบ</button></div></header><section id="configWarning" class="alert warning hidden"></section><section id="loginSection" class="card"><h2>เข้าสู่ระบบ</h2><form id="loginForm" class="form-grid"><label>อีเมล<input id="email" type="email" required></label><label>รหัสผ่าน<input id="password" type="password" required></label><button class="button primary" type="submit">เข้าสู่ระบบ</button></form><p id="loginMessage" class="message"></p></section><section id="generatorSection" class="hidden"><section class="card"><h2>เลือกสินค้า</h2><form id="productSearchForm" class="search-row"><input id="searchInput" autocomplete="off" placeholder="ค้นหาด้วยชื่อ รหัสสินค้า หรือบาร์โค้ด"><button class="button primary" type="submit">ค้นหา</button></form><div id="searchResults" class="search-results"></div><p id="searchMessage" class="message"></p></section><section class="generator-layout"><div class="card settings-card"><h2>ตั้งค่าป้าย</h2><label class="field">ประเภทโค้ด<select id="codeType"><option value="barcode">Barcode Code128</option><option value="qr">QR Code</option><option value="both">แสดงทั้งสองแบบ</option></select></label><label class="field">ค่าที่ใช้สร้าง Barcode<select id="barcodeSource"><option value="barcode">บาร์โค้ดสินค้า</option><option value="product_code">รหัสสินค้า</option></select></label><label class="field">ข้อมูลใน QR Code<select id="qrSource"><option value="barcode">บาร์โค้ดสินค้า</option><option value="product_code">รหัสสินค้า</option><option value="product_json">ข้อมูลสินค้าแบบ JSON</option><option value="custom">ข้อความกำหนดเอง</option></select></label><label id="customQrField" class="field hidden">ข้อความ QR กำหนดเอง<textarea id="customQrText" rows="4"></textarea></label><label class="field">ขนาดป้าย<select id="labelSize"><option value="screen">ตัวอย่างหน้าจอ</option><option value="58mm">58 มม.</option><option value="80mm">80 มม.</option><option value="a4">A4</option></select></label><label class="check-row"><input id="showName" type="checkbox" checked>แสดงชื่อสินค้า</label><label class="check-row"><input id="showPrice" type="checkbox" checked>แสดงราคาขาย</label><label class="check-row"><input id="showProductCode" type="checkbox" checked>แสดงรหัสสินค้า</label><label class="check-row"><input id="showBarcodeText" type="checkbox" checked>แสดงเลขใต้ Barcode</label><div class="button-stack"><button id="generateBtn" class="button primary" type="button">สร้างตัวอย่าง</button><button id="downloadBarcodeBtn" class="button secondary" type="button">ดาวน์โหลด Barcode PNG</button><button id="downloadQrBtn" class="button secondary" type="button">ดาวน์โหลด QR PNG</button><button id="printBtn" class="button danger" type="button">พิมพ์ป้าย</button></div><p id="generatorMessage" class="message"></p></div><div class="card preview-card"><div class="section-heading"><div><h2>ตัวอย่างก่อนพิมพ์</h2><p id="selectedProductText">ยังไม่ได้เลือกสินค้า</p></div></div><div id="printArea" class="label-preview size-screen"><div id="labelName" class="label-name">ชื่อสินค้า</div><div id="labelPrice" class="label-price">฿0.00</div><div id="barcodeBlock" class="code-block"><svg id="barcodeSvg"></svg></div><div id="qrBlock" class="code-block hidden"><div id="qrCanvas"></div></div><div id="labelProductCode" class="label-code">รหัสสินค้า -</div></div></div></section></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.12.3/dist/JsBarcode.all.min.js"></script><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script><script src="./js/supabase-config.js?v=1.0.2"></script><script src="./js/generator.js?v=1.0.2"></script>  <script src="./js/navigation.js?v=1.0.2"></script>
</body></html>

<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TKN POS / ERP - ขายหน้าร้าน</title>
  <link rel="stylesheet" href="./pos.css?v=1.2.0">
  <style>
    .pos-topbar {
      width: min(1180px, calc(100% - 32px));
      margin: 18px auto 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .pos-topbar h1 { margin: 0; font-size: 1.4rem; }
    .pos-topbar p { margin: 3px 0 0; color: #64748b; }
    .dashboard-button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      background: #eef2f7;
      color: #172033;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .dashboard-button:hover { background: #dfe7f1; }
    .received-help {
      display: block;
      margin-top: 5px;
      color: #64748b;
      font-size: .78rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header class="pos-topbar">
    <div>
      <h1>POS ขายหน้าร้าน</h1>
      <p>TKN POS / ERP · Final Stable Core v1.2</p>
    </div>
    <button
      class="dashboard-button"
      type="button"
      onclick="goToUnifiedDashboard()"
    >
      Dashboard
    </button>
  </header>

  <main class="page">
    <section class="card form-grid">
      <label>
        สาขา
        <select id="branch"></select>
      </label>

      <label>
        วิธีชำระเงิน
        <select id="payment">
          <option value="CASH">เงินสด</option>
          <option value="QR">QR</option>
          <option value="TRANSFER">โอนเงิน</option>
          <option value="CARD">บัตร</option>
        </select>
      </label>

      <label>
        ชื่อลูกค้า
        <input id="customerName" autocomplete="off">
      </label>

      <label>
        เบอร์โทร
        <input id="customerPhone" inputmode="tel" autocomplete="off">
      </label>
    </section>

    <section class="pos-layout">
      <div>
        <section class="card">
          <form id="searchForm" class="search-row">
            <input
              id="search"
              autocomplete="off"
              placeholder="สแกนบาร์โค้ด หรือค้นหาชื่อ/รหัสสินค้า"
            >
            <button class="btn primary" type="submit">ค้นหา</button>
          </form>

          <div id="results"></div>
          <p id="searchMsg" class="msg"></p>
        </section>

        <section class="card">
          <h2>ตะกร้าสินค้า</h2>
          <div id="cart"></div>
        </section>
      </div>

      <aside class="card summary">
        <h2>สรุปยอด</h2>

        <div class="summary-line">
          <span>ยอดสินค้า</span>
          <strong id="subtotal">฿0.00</strong>
        </div>

        <label>
          ส่วนลดท้ายบิล
          <input id="discount" type="number" min="0" step="0.01" value="0">
        </label>

        <div class="summary-line net">
          <span>ยอดสุทธิ</span>
          <strong id="netTotal">฿0.00</strong>
        </div>

        <label id="receivedField">
          รับเงิน
          <input
            id="received"
            type="number"
            min="0"
            step="0.01"
            value="0"
            inputmode="decimal"
          >
          <small class="received-help">
            ระบบเติมยอดสุทธิให้อัตโนมัติ และแก้ไขยอดรับเงินจริงได้
          </small>
        </label>

        <div class="summary-line">
          <span>เงินทอน</span>
          <strong id="change">฿0.00</strong>
        </div>

        <label>
          หมายเหตุ
          <textarea id="notes" rows="4"></textarea>
        </label>

        <button id="checkout" class="btn success" type="button">
          ชำระเงินและตัดสต๊อก
        </button>

        <p id="actionMsg" class="msg"></p>
      </aside>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-config.js?v=1.2.0"></script>
  <script src="./pos.js?v=1.2.0"></script>
</body>
</html>

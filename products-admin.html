<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>จัดการสินค้า</title>
  <link rel="stylesheet" href="./css/products-admin.css?v=1.0.0">
  <link rel="stylesheet" href="./css/navigation.css?v=1.0.0">
</head>
<body>
<main class="shell">
  <header class="top">
    <div><h1>จัดการสินค้า</h1><p>ร้านเถ้าแก่น้อยชลบุรี</p></div>
    <div class="row">
      <a class="btn secondary" href="./dashboard.html">Dashboard</a>
      <a class="btn secondary" href="./categories-admin.html">หมวดหมู่/ยี่ห้อ</a>
      <a class="btn secondary" href="./product-stock-admin.html">ปรับสต๊อก</a>
      <a class="btn secondary" href="./import-export.html">Import / Export</a>
    </div>
  </header>

  <section class="card">
    <div class="row">
      <input id="search" placeholder="ค้นหาชื่อ รหัสสินค้า หรือบาร์โค้ด">
      <button id="searchBtn" class="btn primary">ค้นหา</button>
      <button id="newBtn" class="btn success">เพิ่มสินค้าใหม่</button>
    </div>
  </section>

  <section class="card wrap">
    <table>
      <thead>
        <tr>
          <th>รหัส</th><th>สินค้า</th><th>บาร์โค้ด</th><th>หมวดหมู่</th>
          <th>ยี่ห้อ</th><th>ต้นทุน</th><th>ราคาขาย</th><th>คงเหลือรวม</th>
          <th>สถานะ</th><th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="body"></tbody>
    </table>
    <p id="message" class="msg"></p>
  </section>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-card">
    <div class="top">
      <h2 id="modalTitle">เพิ่มสินค้า</h2>
      <button id="closeBtn" class="btn secondary">ปิด</button>
    </div>

    <form id="productForm" class="grid">
      <input id="productId" type="hidden">

      <label class="field">รหัสสินค้า<input id="productCode" required></label>
      <label class="field">ชื่อสินค้า<input id="productName" required></label>

      <label class="field">บาร์โค้ด
        <div class="row">
          <input id="barcode">
          <button id="generateBarcodeBtn" class="btn secondary" type="button">สร้างอัตโนมัติ</button>
        </div>
      </label>

      <label class="field">หมวดหมู่<select id="category" required></select></label>
      <label class="field">หน่วยนับ<select id="unit" required></select></label>
      <label class="field">ยี่ห้อ<select id="brand"></select></label>

      <label class="field">ราคาทุน<input id="costPrice" type="number" min="0" step="0.01" value="0"></label>
      <label class="field">ราคาขาย<input id="sellingPrice" type="number" min="0" step="0.01" value="0"></label>
      <label class="field">ขั้นต่ำแจ้งเตือน<input id="minimumStock" type="number" min="0" step="0.001" value="0"></label>
      <label class="field">VAT %<input id="vatRate" type="number" min="0" max="100" step="0.01" value="0"></label>

      <label class="field">URL รูปสินค้า<input id="imageUrl"></label>
      <label class="field">สถานะ
        <select id="isActive">
          <option value="true">ใช้งาน</option>
          <option value="false">ปิดใช้งาน</option>
        </select>
      </label>

      <label class="field">สาขาสต๊อกเริ่มต้น<select id="initialBranch"></select></label>
      <label class="field">จำนวนเริ่มต้น<input id="initialQuantity" type="number" min="0" step="0.001" value="0"></label>

      <label class="field" style="grid-column:1/-1">รายละเอียด<textarea id="description" rows="3"></textarea></label>

      <button class="btn primary" type="submit">บันทึกสินค้า</button>
    </form>
    <p id="formMessage" class="msg"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-config.js?v=1.0.0"></script>
<script src="./js/products-admin.js?v=1.0.0"></script>
  <script src="./js/navigation.js?v=1.0.0"></script>
</body>
</html>

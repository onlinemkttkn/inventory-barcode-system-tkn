<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>สร้างใบสั่งซื้อ</title>
<link rel="stylesheet" href="./css/purchase.css?v=1.0.0">
<link rel="stylesheet" href="./css/navigation.css?v=1.0.0">
</head>
<body>
<main class="shell">
<header class="top">
  <div><h1>สร้างใบสั่งซื้อ</h1><p>Purchase Order</p></div>
  <div class="row">
    <a class="btn secondary" href="./suppliers.html">ผู้จำหน่าย</a>
    <a class="btn secondary" href="./purchase-order-history.html">ประวัติ PO</a>
  </div>
</header>

<section class="card grid">
<label class="field">ผู้จำหน่าย<select id="supplier"></select></label>
<label class="field">สาขาที่รับสินค้า<select id="branch"></select></label>
<label class="field">วันที่สั่งซื้อ<input id="orderDate" type="date"></label>
<label class="field">กำหนดรับ<input id="expectedDate" type="date"></label>
<label class="field">เลขอ้างอิง<input id="referenceNo"></label>
<label class="field">ส่วนลดท้าย PO<input id="discount" type="number" min="0" step="0.01" value="0"></label>
<label class="field" style="grid-column:1/-1">หมายเหตุ<textarea id="notes"></textarea></label>
</section>

<section class="card">
<form id="searchForm" class="row">
<input id="search" placeholder="ค้นหาชื่อสินค้า รหัส หรือบาร์โค้ด">
<button class="btn primary">ค้นหา</button>
</form>
<div id="results" class="items"></div>
<p id="searchMessage" class="msg"></p>
</section>

<section class="card">
<h2>รายการสั่งซื้อ</h2>
<div id="cart" class="items"></div>
<div class="summary">
<div><span>ยอดก่อน VAT</span><strong id="subtotal">฿0.00</strong></div>
<div><span>VAT</span><strong id="vat">฿0.00</strong></div>
<div><span>ส่วนลดท้าย PO</span><strong id="discountTotal">฿0.00</strong></div>
<div><span>ยอดรวม</span><strong id="grandTotal">฿0.00</strong></div>
</div>
<button id="saveBtn" class="btn success">บันทึก PO</button>
<p id="actionMessage" class="msg"></p>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-config.js?v=1.0.0"></script>
<script src="./js/purchase-order-create.js?v=1.0.0"></script>
<script src="./js/navigation.js?v=1.0.0"></script>
</body>
</html>

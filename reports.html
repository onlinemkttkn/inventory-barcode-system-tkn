<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>รายงานยอดขายและรายรับ</title>
  <link rel="stylesheet" href="./css/governance.css?v=3.4.2">
  <link rel="stylesheet" href="./css/reports-3-4.css?v=3.4.2">
  <link rel="stylesheet" href="./css/theme-red-yellow-black.css?v=3.4.2">
  <link rel="stylesheet" href="./css/navigation.css?v=3.4.2">
</head>
<body>
<main class="shell">
  <header class="page-head">
    <div>
      <p class="eyebrow">MASTER 3.4 LTS · REPORTS</p>
      <h1>รายงานยอดขายและรายรับ</h1>
      <p>กำหนดช่วงวันได้ พร้อมรายวัน รายเดือน รายปี และรายละเอียดสินค้าในบิล</p>
    </div>
    <div class="header-actions">
      <a class="button secondary" href="./dashboard.html">Dashboard</a>
      <button id="logoutBtn" class="button danger" type="button">ออกจากระบบ</button>
    </div>
  </header>

  <section class="card report-toolbar">
    <label>รูปแบบรายงาน
      <select id="period">
        <option value="DAY">รายวัน</option>
        <option value="MONTH">รายเดือน</option>
        <option value="YEAR">รายปี</option>
        <option value="RANGE">กำหนดช่วงวัน</option>
      </select>
    </label>
    <label id="anchorField">วันที่อ้างอิง
      <input id="anchor" type="date">
    </label>
    <label id="startField" hidden>วันที่เริ่มต้น
      <input id="startDate" type="date">
    </label>
    <label id="endField" hidden>วันที่สิ้นสุด
      <input id="endDate" type="date">
    </label>
    <label>ช่องทางชำระ<select id="paymentFilter"><option value="ALL">ทุกช่องทาง</option><option value="CASH">เงินสด</option><option value="QR">QR</option><option value="TRANSFER">เงินโอน</option><option value="CARD">บัตร</option><option value="VOUCHER">Voucher</option><option value="OTHER">อื่น ๆ</option></select></label>
    <button id="load" class="button" type="button">โหลดรายงาน</button>
    <button id="csv" class="button secondary" type="button">Export CSV</button>
    <button id="print" class="button secondary" type="button">พิมพ์</button>
  </section>

  <section class="stats" id="stats"></section>

  <section class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>วันที่</th><th>เลขบิล</th><th>ชำระ</th>
          <th>ยอดสุทธิ</th><th>สถานะ</th><th>รายละเอียด</th></tr>
        </thead>
        <tbody id="rows"><tr><td colspan="6">กำลังโหลด...</td></tr></tbody>
      </table>
    </div>
    <p id="message" class="message"></p>
  </section>
</main>

<dialog id="dialog">
  <div class="dialog-body">
    <div class="dialog-head">
      <h2 id="dialogTitle">รายละเอียดบิล</h2>
      <button id="close" class="button secondary" type="button">ปิด</button>
    </div>
    <div id="dialogContent"></div>
  </div>
</dialog>

<script src="./js/supabase-config.js?v=3.4.2"></script>
<script type="module" src="./js/reports.js?v=3.4.2"></script>
  <script src="./js/navigation.js?v=3.4.2"></script>
</body>
</html>

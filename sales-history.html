<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ประวัติการขาย</title>
  <link rel="stylesheet" href="./css/pos.css?v=1.0.2">
  <link rel="stylesheet" href="./css/navigation.css?v=1.0.2">
  <link rel="icon" href="./assets/icons/favicon.svg?v=1.0.2">
  <link rel="stylesheet" href="./css/theme-red-yellow-black.css?v=3.4.0">
</head>
<body>
<main class="shell">
  <header class="top">
    <div>
      <h1>ประวัติการขาย</h1>
      <p>ร้านเถ้าแก่น้อยชลบุรี</p>
    </div>
    <div class="row">
      <a class="btn secondary" href="./dashboard.html">Dashboard</a>
      <a class="btn primary" href="./pos.html">ขายสินค้า</a>
    </div>
  </header>

  <section class="card grid">
    <label>สาขา
      <select id="branch">
        <option value="">ทุกสาขา</option>
      </select>
    </label>
    <label>สถานะ
      <select id="status">
        <option value="">ทั้งหมด</option>
        <option value="COMPLETED">สำเร็จ</option>
        <option value="VOIDED">ยกเลิก</option>
      </select>
    </label>
    <label>ค้นหา
      <input id="search" placeholder="เลขขาย ลูกค้า หรือผู้ขาย">
    </label>
    <button id="refresh" class="btn primary">โหลดข้อมูล</button>
  </section>

  <section class="card wrap">
    <table>
      <thead>
        <tr>
          <th>วันที่</th>
          <th>เลขที่ขาย</th>
          <th>สาขา</th>
          <th>สถานะ</th>
          <th>รายการ</th>
          <th>จำนวน</th>
          <th>ยอดสุทธิ</th>
          <th>ชำระ</th>
          <th>พนักงาน</th><th>ใบเสร็จ</th>
        </tr>
      </thead>
      <tbody id="body"></tbody>
    </table>
    <p id="message" class="msg"></p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-config.js?v=1.0.2"></script>
<script src="./js/sales-history.js?v=1.0.2"></script>
  <script src="./js/navigation.js?v=1.0.2"></script>
</body>
</html>

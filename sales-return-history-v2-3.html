<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TKN POS - ประวัติคืนสินค้า v2.3</title><link rel="stylesheet" href="./css/phase-9-2-returns-completion-v2-3.css?v=2.3.0"></head><body><main class="page-shell"><header class="page-header"><div><p class="eyebrow">PHASE 09.2 · COMPLETION v2.3</p><h1>ประวัติคืนสินค้า</h1><p>ค้นหา ตรวจสอบ และพิมพ์ใบคืนสินค้า</p></div><a class="secondary-button" href="./dashboard.html">กลับ Dashboard</a></header><section class="panel"><div class="filter-grid"><label>คำค้น<input id="keyword" placeholder="เลขใบคืน / เลขบิล / เหตุผล"></label><label>วันที่เริ่มต้น<input id="dateFrom" type="date"></label><label>วันที่สิ้นสุด<input id="dateTo" type="date"></label><label>วิธีคืนเงิน<select id="refundMethod"><option value="">ทั้งหมด</option><option value="CASH">เงินสด</option><option value="QR">QR</option><option value="TRANSFER">โอน</option><option value="CARD">บัตร</option><option value="STORE_CREDIT">เครดิตร้านค้า</option></select></label><label>สถานะ<select id="status"><option value="">ทั้งหมด</option><option value="COMPLETED">สำเร็จ</option><option value="VOIDED">ยกเลิก</option></select></label></div><div class="actions"><button id="searchButton" class="primary-button">ค้นหา</button><button id="resetButton" class="secondary-button">ล้างตัวกรอง</button></div></section><section class="summary-grid"><article class="summary-card"><span>จำนวนใบคืน</span><strong id="summaryCount">0</strong></article><article class="summary-card"><span>จำนวนสินค้าคืน</span><strong id="summaryQty">0</strong></article><article class="summary-card"><span>ยอดคืนเงิน</span><strong id="summaryRefund">฿0.00</strong></article></section><section class="panel"><div class="section-heading"><h2>รายการคืนสินค้า</h2><span id="resultMessage"></span></div><div class="table-wrap"><table><thead><tr><th>เลขใบคืน</th><th>เลขบิล</th><th>วันที่</th><th>จำนวนรายการ</th><th>จำนวนคืน</th><th>วิธีคืนเงิน</th><

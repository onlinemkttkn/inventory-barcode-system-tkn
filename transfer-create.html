<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>โอนสินค้าระหว่างสาขา</title>
  <link rel="stylesheet" href="./css/transfer.css?v=3.4.0">
  <link rel="stylesheet" href="./css/mobile-operations.css?v=3.4.0">
  <link rel="stylesheet" href="./css/navigation.css?v=3.4.0">
</head>
<body>
<main class="shell">
  <header class="top">
    <div><p class="eyebrow">MASTER 3.4 · MOBILE TRANSFER</p>
      <h1>โอนสินค้าระหว่างสาขา</h1>
      <p>สแกน QR/Barcode เพิ่มหลายสินค้า และยืนยันครั้งเดียว</p></div>
  </header>

  <section class="card operation-grid">
    <label>ต้นทาง<select id="source"></select></label>
    <label>ปลายทาง<select id="dest"></select></label>
    <label>เลขอ้างอิง<input id="ref"></label>
    <label>หมายเหตุ<textarea id="notes" rows="2"></textarea></label>
  </section>

  <section class="card">
    <form id="searchForm" class="mobile-search">
      <input id="search" placeholder="ชื่อสินค้า รหัส หรือบาร์โค้ด"
        autocomplete="off" enterkeyhint="search">
      <button class="btn primary" type="submit">ค้นหา</button>
      <button id="scanBtn" class="btn scan" type="button">สแกนกล้อง</button>
    </form>
    <div id="results" class="items"></div>
    <p id="searchMsg" class="message"></p>
  </section>

  <section class="card">
    <div class="section-head"><h2>รายการโอน</h2>
      <span id="cartSummary">0 รายการ</span></div>
    <div id="cart" class="items"></div>
    <button id="save" class="btn primary full" type="button">
      ยืนยันส่งสินค้าทั้งหมด
    </button>
    <p id="actionMsg" class="message"></p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-config.js?v=3.4.0"></script>
<script src="./js/transfer-common.js?v=3.4.0"></script>
<script type="module" src="./js/transfer-create.js?v=3.4.0"></script>
<script src="./js/navigation.js?v=3.4.0"></script>
</body>
</html>

<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>จัดการผู้ใช้และสิทธิ์</title>
  <link rel="stylesheet" href="./css/governance.css?v=3.1.0">
  <link rel="stylesheet" href="./css/theme-red-yellow-black.css?v=3.4.2">
  <link rel="stylesheet" href="./css/navigation.css?v=3.4.2">
</head>
<body>
  <main class="shell">
    <header class="page-head">
      <div><p class="eyebrow">MASTER 3.3 LTS · UUID RBAC</p>
        <h1>จัดการผู้ใช้และสิทธิ์</h1>
        <p>กำหนด Role สาขา รหัสพนักงาน PIN และชื่อแคชเชียร์ที่แสดงบนใบเสร็จ</p></div>
      <a class="button secondary" href="./dashboard.html">Dashboard</a>
    </header>

    <section class="card toolbar">
      <input id="search" placeholder="ค้นหาชื่อ อีเมล รหัสพนักงาน หรือ Role">
      <select id="roleFilter"><option value="ALL">ทุก Role</option></select>
      <select id="statusFilter"><option value="ALL">ทุกสถานะ</option><option value="ACTIVE">ใช้งาน</option><option value="INACTIVE">ปิดใช้งาน</option></select>
      <button id="reload" class="button">รีเฟรช</button>
    </section>

    <section class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>ผู้ใช้</th><th>Role</th><th>สาขา</th>
          <th>สถานะ</th><th>เข้าใช้ล่าสุด</th><th>แคชเชียร์</th><th>บันทึก</th></tr></thead>
        <tbody id="rows"><tr><td colspan="7">กำลังโหลด...</td></tr></tbody>
      </table></div>
      <p id="message"></p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-config.js"></script>
  <script type="module" src="./js/users-admin.js?v=3.4.7"></script>
  <script src="./js/navigation.js?v=3.4.2"></script>
</body>
</html>
